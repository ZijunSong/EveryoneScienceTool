# 复制为 config.yaml 后按需修改；也可用 --config 指定路径
# 占位符：{paper_text} {related_work_context} {round} {generator_output} {reviewer_output} {full_transcript}
# 大纲审稿占位符：{final_title_abstract} {outline_draft} {outline_review} {paper_excerpt}

run:
  # 审稿模式：classic=单一审稿人；acl=三位审稿人 ACL 5 分制（每位≥acl_score_threshold 分才通过）
  review_mode: acl
  # 通过阈（三位审稿人分数的最低分 ≥ 该值）；支持 2.5、3.5 等半分（见 acl_review 口径说明）
  acl_score_threshold: 3
  # 大纲阶段：ACL 未达标时最多迭代修订轮数
  max_outline_acl_rounds: 5
  max_rounds: 5
  max_idea_attempts: 5
  # 审稿人未写「建议放弃」时，仍须至少完成这么多轮「生成→审稿→回应」才允许定稿进大纲（可用 CLI --min-debate-rounds 覆盖，且不超过 max_rounds）
  min_debate_rounds_before_outline: 2
  # 大纲：初稿 → 审稿人审 → 再修订（false 则仅初稿，省费用）
  enable_outline_review: true
  # 详细进度（每步字数、完整 ckpt 路径）；也可用 CLI --verbose-progress
  verbose_progress: false
  temperature: 0.7
  max_tokens: 8192
  request_timeout_sec: 600
  # arXiv 相关工作检索（生成器用）；可用 --no-related-search 关闭
  arxiv_related_max_results: 8
  arxiv_related_max_chars: 14000
  # 上游网关偶发 403（pre_consume_token_quota_failed / SQL）时可自动重试
  api_max_retries: 6
  api_retry_base_delay_sec: 2.0
  # 每次 checkpoint 后用独立模型精炼 progress → progress_refined.md（可按轮缓存，省重复调用）
  progress_distill: true
  progress_distill_model: gpt-5-codex-mini
  progress_distill_temperature: 0.35
  progress_distill_max_tokens: 8192
  progress_distill_timeout_sec: 600

# 可为不同角色指定不同模型；若省略则使用 CLI 的 --model
# reviewers_acl：仅 review_mode=acl 时使用，须恰好 3 个不同模型名（建议强/中/Code 各一以保证区分度）
models:
  generator: null   # null 表示使用默认 --model
  reviewer: null
  outline: null
  reviewers_acl:
    - gpt-5.4
    - gpt-5.2-codex
    - gpt-5.1-codex-max

prompts:
  round1:
    generator: |
      我是一名 Agent 方向的博士生，想基于一篇**种子论文**的局限性提出一个新的研究 idea（方法型和分析型均可），目标是按 7 个月后 ICLR Best Paper 标准来构思。请完全使用中文，围绕“如何真正超越原论文而非做增量改进”来思考，最终只输出你认为最值得做的一个 idea，并以“标题 + 摘要”的形式给出。

      **领域调研要求（必做）**：你不能只盯着种子论文本身。你必须结合
      （1）下方「相关工作检索摘要」（来自 arXiv 的若干可能相关条目，仅供参考）；
      （2）你对该子领域**其他**代表工作、常见 setting 与评价指标的知识；
      简要说明：领域内主流做法分哪几类、你的 idea 与它们的**差异点**与**不可替代性**（为何不是已有工作的自然拼接）。

      要求如下：
      1. 不要以以下方向为核心：预训练、对齐、神经符号学、流形学习、鲁棒性与安全、具身智能、图/知识图谱、世界模型、反事实、SSM（如 Mamba）等；如有少量涉及可以，但不能成为主线。
      2. 必须强调前瞻性，考虑 7 个月后开源和闭源前沿模型原生能力进一步提升后的情形，避免被审稿人质疑“只是补丁式改进”或“会被更强基座模型自然吞没”。
      3. 我是单人完成项目，计算资源只有 8 卡 H20，不希望依赖大规模训练或高成本闭源 API；实验设计必须现实可落地，周期可控，但论文质量优先。
      4. 请优先考虑那种不仅能打动小同行，还可能对 Agent 研究方向产生引领作用的问题设定。
      你可以先做必要的分析与筛选，但最后必须收敛到一个最佳 idea，并说明你为何选择它而不是其他方向。

      【相关工作检索摘要（自动拉取，可能不全；请批判性使用并补充你熟悉的文献）】

      {related_work_context}

      下面是我提供的种子论文/Blog 正文（可能经截断）：

      {paper_text}

    reviewer: |
      我是一名 Agent 研究方向的博士生。下面我会给你一个初步 research idea。你的角色是**顶会严格审稿人**与**迭代教练（mentor）**的结合体：既要严肃评估，也要帮助生成器**沿着有前途的方向迭代前进**，避免“空转辩论、没有推进”。

      请完全使用中文，并严格遵守以下原则：

      **任务目标（双重）**：
      1）判断这个 idea 是否值得继续投入（oral 潜力、在更强基座出现后是否仍成立）；**不要**无原则吹捧，也**不要**只泼冷水不给路。
      2）无论结论如何，都要给出**可操作的下一步**：下一轮生成器应朝哪个**更尖锐的问题表述、更清晰的假设、更合适的对照与指标**去努力——这才是“迭代着前进”。

      硬性背景：
      1. 我的研究方向是 Agent，不做以下方向为核心主线：预训练、对齐、神经符号学、流形学习、鲁棒性与安全、具身智能、图/知识图谱、世界模型、反事实、SSM（如 Mamba）等。
      2. 我希望 idea 具有前瞻性，要考虑 7 个月后开源/闭源前沿模型原生能力继续增强后的局面，尤其避免“创新性不足”“只是补丁式改进”“会被更强 base model 自然吞没”。
      3. 我只能单人完成，算力为 8 卡 H20，研究周期有限，不希望依赖大规模训练或高成本闭源 API。
      4. 我不接受“勉强中稿但没有真正价值”的选题；但若当前版本弱、**大方向仍值得挖**，你要在第四部分指明**如何挖**，而不是只写“不行”。

      评估要求（否决性角度仍要覆盖）：
      - 是否只是已有范式上的局部修补；
      - 是否过度依赖基础模型变强；
      - 是否“直觉自然但不新”；
      - 实验闭环是否过重；
      - 影响力是否可能只停留在小圈子。

      决策规则（与一句话结论一致）：
      - 若当前版本不值得做，结论仍用「建议放弃」，但必须在**第四部分**说明：若坚持同一大方向，**最小 pivot** 可能是什么（可选 1–2 条），或建议转向何种**相邻**问题。
      - 若核心对、只差少量修改：结论用「可做但需要极少量修改」，第三部分给 1—2 条最小修改。
      - 若整体值得推进：结论用「值得做」，第四部分给出**强化 oral 叙事**的具体建议（对照哪些工作、补哪些实验）。

      输出格式：
      第一部分：一句话结论，只能三选一：
      - 值得做
      - 可做但需要极少量修改
      - 建议放弃
      第二部分：核心判断理由（简洁有力）
      第三部分：如果且仅如果结论是「可做但需要极少量修改」，给出最多 1—2 条最小必要修改，并解释为何仍算同一 idea。
      第四部分：建设性迭代方向（必做）
      无论第一部分的结论是什么，都必须写本部分：给出 **1—2 条**「下一轮最值得推进的有前途方向」——可以是：问题细化、假设澄清、与某类代表工作的对齐方式、建议补充的对照/消融、或明确建议放弃当前表述并转向何种更尖锐的问题。**禁止**只写套话；要让生成器读完就知道**下一步该怎么改**。

      下面是 idea：
      {generator_output}

    reflection: |
      下面是我的导师对你给我的 idea 的评价。请你首先分析你是否认同，并**重点回应导师在「第四部分：建设性迭代方向」中的具体建议**——哪些你愿意吸收进下一版 idea，哪些不采纳及原因。
      **重要**：即使导师第一部分写的是「值得做」或「可做但需要极少量修改」，本回应也不是“走过场”：你必须针对不清楚、不严谨或可加强之处做**书面 rebuttal**，并给出**修订后的**「标题 + 摘要」（或明确放弃）。系统在未达到最少辩论轮次前**不会**仅凭一句「值得做」就定稿进大纲。
      **规则**：若导师一句话结论中**没有**「建议放弃」，你**不得**声称放弃当前 idea；除非导师明确否定，否则应继续沿建设性方向迭代（系统也会据此忽略无效的「放弃」表态）。
      然后判断：是优化这个 idea（沿导师指出的方向**实质前进**），还是放弃当前版本。
      导师的完整评价如下：
      {reviewer_output}

      此外，这是我之前提出的 idea（供你对照）：
      {generator_output}

  # 第 2 轮及以后：可完全重写本段；未设置时回退到 round1 对应字段
  round2:
    generator: |
      这是第 {round} 轮迭代。请阅读此前的完整对话摘要，并继续利用**领域调研**意识：结合下方「相关工作检索摘要」、对话中的批评与建设性方向，给出修订后的唯一最佳 idea。
      你必须体现相对上一轮的**实质前进**（不是措辞替换）：回应审稿人第四部分的迭代方向，或明确说明为何转向新表述。
      仍以「标题 + 摘要」为主，并简要说明你做了哪些关键调整、为何仍值得做（或明确放弃并说明原因）。

      【相关工作检索摘要（与首轮相同来源，供你对照）】
      {related_work_context}

      对话与材料上下文：
      {full_transcript}
    reviewer: |
      这是第 {round} 轮。请继续以「严格审稿人 + 迭代教练」身份，对下面「生成模型最新输出」评估；**输出格式与第一轮完全相同**（含第一至四部分，且第四部分「建设性迭代方向」必写）。
      生成模型最新输出：
      {generator_output}
    reflection: |
      第 {round} 轮。请分析你是否认同导师的评价，并**对照第四部分建设性方向**决定：优化 idea（实质前进）还是放弃。若继续优化，请给出下一轮可用的清晰「标题 + 摘要」结论段。
      **重要**：若导师结论偏积极（「值得做」或「可做但需要极少量修改」），仍须把本回应当作**正式 rebuttal**：逐条消化第四部分，修订表述与假设，**不要**因结论积极就只写“同意、无补充”。
      **规则**：若导师一句话结论中**没有**「建议放弃」，你**不得**声称放弃当前 idea。
      导师完整评价：
      {reviewer_output}
      你上一轮提交的 idea：
      {generator_output}

  round3: {}
  round4: {}
  round5: {}

  # 若 round3..5 为空对象，则使用 round2 的模板（通过 fallback）
  fallback_multi_round: round2

outline:
  # review_prompt / revision_prompt 可省略，使用代码内置默认；自定义时请保留占位符
  review_prompt: ""
  revision_prompt: ""
  prompt: |
    请你把我这个修改后的 idea 扩展为详细的论文大纲。请你按照下面的顺序组织：
    1. Related Work
    请你全面调研与该 idea 相关的近三年的相关工作（顶会+Arxiv），并将其聚类为2-3类，分别说明其优点与缺点。
    2. Introduction
    Follow调研到的这些相关工作，从宏观Background到该研究领域当前的研究背景与现状，进行详细叙述，并总结我们的新方法的贡献。
    3. Method
    将初步idea细化为详细的方法pipeline，让导师一眼就能看明白我要做什么。要求我的方法必须能够解决每一类相关工作的缺点，如果做不到，那就直接告诉我，废弃这个idea。我们只做Oral级的成果，不在增量式创新上浪费时间。
    4. Experiment
    4.1 实验设置
    应该选取哪些开源模型，在哪些任务进行测试，与哪些任务进行比较？
    4.2 主实验
    详细列举出一共都需要进行哪些实验。
    4.3 消融实验
    详细列举出一共都需要哪些消融实验。

    下面是最终确定的标题与摘要：
    {final_title_abstract}
